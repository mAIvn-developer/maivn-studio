name: CI

on:
  pull_request:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

concurrency:
  group: maivn-studio-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Sync environment
        run: uv sync --frozen

      - name: Validate OSS license report
        run: uv run --no-sync python scripts/oss_license_audit.py

      - name: Ruff
        run: uv run --no-sync ruff check .

      - name: Pyright
        run: uv run --no-sync pyright

      - name: Pytest
        run: uv run --no-sync pytest

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend bundle
        working-directory: frontend
        run: npm run build

      - name: Build wheel
        run: uv build --wheel

      - name: Validate wheel contents
        run: uv run --no-sync python scripts/check_wheel_contents.py dist/*.whl
