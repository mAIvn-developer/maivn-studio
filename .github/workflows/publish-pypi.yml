name: Publish PyPI

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: maivn-studio-pypi-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - uses: astral-sh/setup-uv@v6

      - name: Validate release version
        run: uv run --with packaging --no-project python scripts/release_guard.py

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend bundle
        working-directory: frontend
        run: npm run build

      - name: Build distributions
        run: uv build

      - name: Validate wheel contents
        run: uv run --with packaging --no-project python scripts/check_wheel_contents.py dist/*.whl

      - name: Validate distributions
        run: uvx twine check dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
